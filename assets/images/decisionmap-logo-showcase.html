<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecisionMap Logo Showcase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #fff; }
  .section { padding: 60px 40px; max-width: 900px; margin: 0 auto; }
  .section-title { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #A0A0AA; margin-bottom: 40px; }
  .logo-grid { display: grid; gap: 40px; }
  .logo-card { border-radius: 16px; padding: 50px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
  .dark-card { background: #0C0C12; border: 1px solid #222; }
  .light-card { background: #FFFFFF; border: 1px solid #e0e0e0; }
  .mid-card { background: #2a2a3e; border: 1px solid #333; }
  .icon-row { display: flex; gap: 60px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .icon-container { text-align: center; }
  .icon-label { font-size: 11px; color: #A0A0AA; margin-top: 12px; letter-spacing: 1px; }
  .color-swatches { display: flex; gap: 20px; flex-wrap: wrap; }
  .swatch { width: 80px; text-align: center; }
  .swatch-circle { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 8px; border: 2px solid rgba(255,255,255,0.1); }
  .swatch-label { font-size: 11px; color: #A0A0AA; }
  .swatch-hex { font-size: 12px; font-family: monospace; color: #ccc; }
</style>
</head>
<body>
<div class="section">
  <div class="section-title">DecisionMap Logo System &mdash; MangoLila Brand</div>
  <div class="logo-grid">

    <!-- Full logo on dark -->
    <div>
      <div class="icon-label" style="margin-bottom:12px">LOGO &mdash; DARK BACKGROUND</div>
      <div class="logo-card dark-card">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="460" height="106">
          <g transform="translate(20, 5) scale(0.68)">
            <path d="M60 10 C33 10, 12 31, 12 56 C12 81, 60 150, 60 150 C60 150, 108 81, 108 56 C108 31, 87 10, 60 10 Z" fill="#FF8C00"/>
            <circle cx="60" cy="56" r="10" fill="#0C0C12"/><circle cx="60" cy="28" r="6" fill="#0C0C12"/>
            <circle cx="38" cy="74" r="6" fill="#0C0C12"/><circle cx="82" cy="74" r="6" fill="#0C0C12"/>
            <circle cx="32" cy="48" r="5" fill="#0C0C12"/><circle cx="88" cy="48" r="5" fill="#0C0C12"/>
            <line x1="60" y1="46" x2="60" y2="34" stroke="#0C0C12" stroke-width="3" stroke-linecap="round"/>
            <line x1="52" y1="62" x2="42" y2="70" stroke="#0C0C12" stroke-width="3" stroke-linecap="round"/>
            <line x1="68" y1="62" x2="78" y2="70" stroke="#0C0C12" stroke-width="3" stroke-linecap="round"/>
            <line x1="51" y1="52" x2="37" y2="50" stroke="#0C0C12" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="69" y1="52" x2="83" y2="50" stroke="#0C0C12" stroke-width="2.5" stroke-linecap="round"/>
          </g>
          <text x="120" y="70" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" letter-spacing="0.5">
            <tspan fill="#FFFFFF">Decision</tspan><tspan fill="#FF8C00">Map</tspan>
          </text>
          <text x="121" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#A0A0AA" letter-spacing="3" font-weight="400">MAP PROBLEMS · FIND SOLUTIONS</text>
        </svg>
      </div>
    </div>

    <!-- Full logo on light -->
    <div>
      <div class="icon-label" style="margin-bottom:12px">LOGO &mdash; LIGHT BACKGROUND</div>
      <div class="logo-card light-card">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="460" height="106">

            <line x1="52" y1="62" x2="42" y2="70" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="68" y1="62" x2="78" y2="70" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="51" y1="52" x2="37" y2="50" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="69" y1="52" x2="83" y2="50" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
          </g>
          <text x="120" y="70" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" letter-spacing="0.5">
            <tspan fill="#0C0C12">Decision</tspan><tspan fill="#FF8C00">Map</tspan>
          </text>
          <text x="121" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#666670" letter-spacing="3" font-weight="400">MAP PROBLEMS · FIND SOLUTIONS</text>
        </svg>
      </div>
    </div>

              <path d="M60 10 C33 10, 12 31, 12 56 C12 81, 60 150, 60 150 C60 150, 108 81, 108 56 C108 31, 87 10, 60 10 Z" fill="#FF8C00"/>
              <circle cx="60" cy="56" r="10" fill="#0C0C12"/><circle cx="60" cy="28" r="6" fill="#0C0C12"/>

              <circle cx="32" cy="48" r="5" fill="#0C0C12"/><circle cx="88" cy="48" r="5" fill="#0C0C12"/>

              <line x1="51" y1="52" x2="37" y2="50" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="69" y1="52" x2="83" y2="50" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="icon-label">Icon (light)</div>
        </div>
        <div class="icon-container">
          <div class="logo-card dark-card" style="padding:30px; min-height:auto; width:160px; height:160px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
              <path d="M32 4 C18 4, 6 16, 6 29 C6 42, 32 60, 32 60 C32 60, 58 42, 58 29 C58 16, 46 4, 32 4 Z" fill="#FF8C00"/>

    <!-- Color reference -->
    <div>
      <div class="icon-label" style="margin-bottom:12px">FARBPALETTE (MangoLila-aligned)</div>
      <div class="logo-card mid-card">
        <div class="color-swatches">
          <div class="swatch"><div class="swatch-circle" style="background:#FF8C00"></div><div class="swatch-label">Primary</div><div class="swatch-hex">#FF8C00</div></div>
          <div class="swatch"><div class="swatch-circle" style="background:#C04FA0"></div><div class="swatch-label">Secondary</div><div class="swatch-hex">#C04FA0</div></div>

</div>

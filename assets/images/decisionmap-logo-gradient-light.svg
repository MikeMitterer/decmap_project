<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <!-- DecisionMap Logo - Gradient Variant (Orange → Lila), transparent background, light text -->
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#C04FA0"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#C04FA0"/>
    </linearGradient>
    <mask id="pinMask">
      <rect x="-200" y="-200" width="1000" height="1000" fill="white"/>
      <circle cx="60" cy="56" r="10" fill="black"/>
      <circle cx="60" cy="28" r="6" fill="black"/>
      <circle cx="38" cy="74" r="6" fill="black"/>
      <circle cx="82" cy="74" r="6" fill="black"/>
      <circle cx="32" cy="48" r="5" fill="black"/>
      <circle cx="88" cy="48" r="5" fill="black"/>
      <line x1="60" y1="46" x2="60" y2="34" stroke="black" stroke-width="3" stroke-linecap="round"/>
      <line x1="52" y1="62" x2="42" y2="70" stroke="black" stroke-width="3" stroke-linecap="round"/>
      <line x1="68" y1="62" x2="78" y2="70" stroke="black" stroke-width="3" stroke-linecap="round"/>
      <line x1="51" y1="52" x2="37" y2="50" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="69" y1="52" x2="83" y2="50" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
    </mask>
  </defs>

  <g transform="translate(20, 5) scale(0.68)">
    <path d="M60 10 C33 10, 12 31, 12 56 C12 81, 60 150, 60 150 C60 150, 108 81, 108 56 C108 31, 87 10, 60 10 Z" fill="url(#pinGrad)" mask="url(#pinMask)"/>
  </g>

  <text x="120" y="70" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" letter-spacing="0.5">
    <tspan fill="#0C0C12">Decision</tspan><tspan fill="url(#mapGrad)">Map</tspan>
  </text>
  <text x="121" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#666670" letter-spacing="3" font-weight="400">MAP PROBLEMS · FIND SOLUTIONS</text>
</svg>
